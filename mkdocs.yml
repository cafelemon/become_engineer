site_name: Become Engineer
site_description: 面向小白的工程、CS、Web、AI 与 LLM/Agent 公开学习库
site_url: https://cafelemon.github.io/become_engineer/
repo_url: https://github.com/cafelemon/become_engineer
repo_name: cafelemon/become_engineer

docs_dir: site-src
site_dir: site
use_directory_urls: true
strict: false

theme:
  name: material
  language: zh
  icon:
    logo: material/school
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tutor-search.js
  - javascripts/tutor.js
  - javascripts/personalization-core.js
  - javascripts/personalization.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  docs/**
  content-inbox/**
  source-materials/**
  **/.DS_Store
  **/__pycache__/**
  **/*.pyc
  **/*.db
  **/*.db-journal

nav:
  - 首页:
      - README.md
      - 学习路线: learning-paths/beginner-roadmap.md
      - 完整课程地图: learning-paths/curriculum-map.md
  - 开始学习:
      - 工程基础入门:
          - 学习方法: learning-paths/engineering-foundation/stage-0/01-learning-method.md
          - 文件系统: learning-paths/engineering-foundation/stage-0/02-filesystem.md
          - 终端与 Shell: learning-paths/engineering-foundation/stage-0/03-terminal-shell.md
          - VS Code 编辑器: learning-paths/engineering-foundation/stage-0/04-editor.md
          - Markdown: learning-paths/engineering-foundation/stage-0/05-markdown.md
          - 本地 Git 与 .gitignore: learning-paths/engineering-foundation/stage-0/06-git.md
          - GitHub 远程协作: learning-paths/engineering-foundation/stage-0/06-github-remote.md
          - 开发环境: learning-paths/engineering-foundation/stage-0/07-development-environment.md
          - Docker最小认知: learning-paths/engineering-foundation/stage-0/08-docker-basics.md
          - 验证习惯: learning-paths/engineering-foundation/stage-0/09-validation-habit.md
      - Python 起步:
          - 课程说明: learning-paths/programming-languages/python-basics/README.md
          - 变量、基本类型、输入输出: learning-paths/programming-languages/python-basics/01-variables-types-io.md
          - 条件、循环、布尔逻辑: learning-paths/programming-languages/python-basics/02-conditions-loops-boolean.md
          - 函数、参数、返回值和作用域: learning-paths/programming-languages/python-basics/03-functions-parameters-returns-scope.md
          - 字符串、列表、字典、集合和元组: learning-paths/programming-languages/python-basics/04-strings-collections.md
          - 文件、路径、JSON 和简单目录操作: learning-paths/programming-languages/python-basics/05-files-json-paths.md
          - 模块、导入和虚拟环境: learning-paths/programming-languages/python-basics/06-modules-imports-venv.md
          - 异常、基本调试和最小自动化测试: learning-paths/programming-languages/python-basics/07-errors-debugging-tests.md
      - C++ 核心语言:
          - 课程说明: learning-paths/programming-languages/cpp-core/README.md
          - 从源文件到可执行程序: learning-paths/programming-languages/cpp-core/01-build-types-io.md
          - 函数、声明与程序组织: learning-paths/programming-languages/cpp-core/02-functions-declarations-program-organization.md
          - 头文件、源文件与最小 CMake 工程: learning-paths/programming-languages/cpp-core/03-headers-sources-cmake.md
          - STL 容器、迭代器与基础算法: learning-paths/programming-languages/cpp-core/04-stl-containers-iterators-algorithms.md
          - 对象、引用、指针、生命周期与 RAII: learning-paths/programming-languages/cpp-core/05-objects-references-pointers-lifetime-raii.md
      - Python 核心语言:
          - 课程说明: learning-paths/programming-languages/python-core/README.md
          - 类型提示、接口与静态检查认知: learning-paths/programming-languages/python-core/01-type-hints-interfaces-static-checking.md
          - 可维护函数接口、协议与模块边界: learning-paths/programming-languages/python-core/02-maintainable-function-interfaces-protocols-modules.md
          - 容器协议、迭代器与生成器: learning-paths/programming-languages/python-core/03-iterables-iterators-generators.md
          - 数据模型、数据类与上下文管理: learning-paths/programming-languages/python-core/04-data-model-dataclasses-context-managers.md
          - 装饰器、闭包与自定义上下文管理器: learning-paths/programming-languages/python-core/05-decorators-closures-custom-context-managers.md
          - 包结构、可安装入口与 CLI: learning-paths/programming-languages/python-core/06-package-structure-installable-cli.md
          - TOML 配置、日志与诊断: learning-paths/programming-languages/python-core/07-toml-configuration-logging-diagnostics.md
      - CS 核心:
          - 课程说明: learning-paths/cs-core/README.md
          - 序列接口、数组表示与安全边界: learning-paths/cs-core/01-sequence-interface-array-representation-boundaries.md
          - 操作计数、增长率与渐近复杂度: learning-paths/cs-core/02-operation-count-growth-asymptotic-complexity.md
          - 字符串、UTF-8 字节与码点边界: learning-paths/cs-core/03-string-utf8-byte-code-point-boundaries.md
          - 二维网格、行优先布局与坐标边界: learning-paths/cs-core/04-two-dimensional-grid-row-major-layout.md
          - 动态数组容量、扩容成本与摊还分析: learning-paths/cs-core/05-dynamic-array-capacity-amortized-cost.md
          - 单链表、节点链接与所有权: learning-paths/cs-core/06-singly-linked-list-nodes-ownership.md
          - 栈、LIFO 接口与空栈边界: learning-paths/cs-core/07-stack-lifo-interface-underflow.md
          - 队列、FIFO 与首尾不变量: learning-paths/cs-core/08-queue-fifo-head-tail-invariants.md
          - 哈希函数、键相等与冲突: learning-paths/cs-core/09-hash-function-key-equality-collisions.md
          - 分离链接、负载因子与扩容: learning-paths/cs-core/10-separate-chaining-load-factor-rehash.md
          - 集合去重、频次映射与稳定输出: learning-paths/cs-core/11-set-frequency-map-deterministic-output.md
          - 有序查找、半开区间与左右边界: learning-paths/cs-core/12-ordered-search-half-open-boundaries.md
          - 插入排序、选择排序与稳定性: learning-paths/cs-core/13-insertion-selection-sort-stability.md
          - 自底向上归并排序与稳定复杂度: learning-paths/cs-core/14-bottom-up-merge-sort-stable-complexity.md
  - 项目:
      - 项目说明: projects/README.md
      - 项目主干规划: projects/project-roadmap.md
      - 求职训练样板:
          - Python 起步机考与限时模拟: exercises/career-readiness/python-entry-machine-test.md
          - 学习进度报告器项目证据问答: exercises/career-readiness/study-progress-reporter-evidence.md
      - CS 阶段作品:
          - 可追踪数组实验: exercises/cs-core/traceable-array-lab/README.md
          - 可追踪线性结构实验: exercises/cs-core/traceable-linear-structures-lab/README.md
          - 可追踪哈希实验: exercises/cs-core/traceable-hash-lab/README.md
          - 可追踪查找与排序实验: exercises/cs-core/traceable-search-sort-lab/README.md
      - Python 内容分析工具: projects/python-content-analysis/README.md
      - 结构化数据机器学习系统: projects/structured-data-ml-system/README.md
      - 文本分类模型演进: projects/text-classification-evolution/README.md
      - 强化学习控制实验: projects/reinforcement-learning-control-lab/README.md
      - 可评估的智能学习助手: projects/intelligent-learning-assistant/README.md
