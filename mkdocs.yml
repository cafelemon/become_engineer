site_name: Become Engineer
site_description: 面向小白的工程、CS、Web、AI 与 LLM/Agent 公开学习库
site_url: https://cafelemon.github.io/become_engineer/
repo_url: https://github.com/cafelemon/become_engineer
repo_name: cafelemon/become_engineer

docs_dir: site-src
site_dir: site
use_directory_urls: true
strict: false

theme:
  name: material
  language: zh
  icon:
    logo: material/school
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  **/.DS_Store
  **/__pycache__/**
  **/*.pyc
  **/*.db
  **/*.db-journal

nav:
  - 首页: README.md
  - 开始学习:
      - 小白统一学习路线: learning-paths/beginner-roadmap.md
      - 总学习地图: maps/README.md
      - Become Engineer 总地图: maps/become-engineer-map.md
      - Python-AI-LLM 能力依赖图: maps/python-ai-llm-dependency-map.md
      - Python-AI-LLM 素材覆盖说明: maps/python-ai-llm-content-coverage.md
  - 工程基础:
      - 主线入口: learning-paths/engineering-foundation/README.md
      - 阶段 0 入口: learning-paths/engineering-foundation/stage-0/README.md
      - 01 学习方法: learning-paths/engineering-foundation/stage-0/01-learning-method.md
      - 02 文件系统: learning-paths/engineering-foundation/stage-0/02-filesystem.md
      - 03 终端与 Shell: learning-paths/engineering-foundation/stage-0/03-terminal-shell.md
      - 04 编辑器: learning-paths/engineering-foundation/stage-0/04-editor.md
      - 05 Markdown: learning-paths/engineering-foundation/stage-0/05-markdown.md
      - 06 Git: learning-paths/engineering-foundation/stage-0/06-git.md
      - 07 开发环境: learning-paths/engineering-foundation/stage-0/07-development-environment.md
      - 08 Docker最小认知: learning-paths/engineering-foundation/stage-0/08-docker-basics.md
      - 09 验证习惯: learning-paths/engineering-foundation/stage-0/09-validation-habit.md
  - 六条主线:
