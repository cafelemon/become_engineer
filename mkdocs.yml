site_name: Become Engineer
site_description: 面向小白的工程、CS、Web、AI 与 LLM/Agent 公开学习库
site_url: https://cafelemon.github.io/become_engineer/
repo_url: https://github.com/cafelemon/become_engineer
repo_name: cafelemon/become_engineer

docs_dir: site-src
site_dir: site
use_directory_urls: true
strict: false

theme:
  name: material
  language: zh
  icon:
    logo: material/school
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/tutor-search.js
  - javascripts/tutor.js
  - javascripts/python-runner.js
  - javascripts/cs-trace.js
  - javascripts/personalization-core.js
  - javascripts/personalization.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  docs/**
  content-inbox/**
  source-materials/**
  **/.DS_Store
  **/__pycache__/**
  **/node_modules/**
  **/*.pyc
  **/*.db
  **/*.db-journal
  **/*.sqlite
  **/*.sqlite3

# 课程内容架构样板仅用于本地评审。`mkdocs serve` 会显示草稿标记，
# 正式 `mkdocs build` 不会生成这些页面或把它们写入搜索索引。
draft_docs: |
  reviews/course-content/**

