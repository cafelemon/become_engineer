site_name: Become Engineer
site_description: 面向小白的工程、CS、Web、AI 与 LLM/Agent 公开学习库
site_url: https://cafelemon.github.io/become_engineer/
repo_url: https://github.com/cafelemon/become_engineer
repo_name: cafelemon/become_engineer

docs_dir: site-src
site_dir: site
use_directory_urls: true
strict: false

theme:
  name: material
  language: zh
  icon:
    logo: material/school
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  docs/**
  content-inbox/**
  source-materials/**
  **/.DS_Store
  **/__pycache__/**
  **/*.pyc
  **/*.db
  **/*.db-journal

nav:
  - 首页:
      - README.md
      - 学习路线: learning-paths/beginner-roadmap.md
      - 完整课程地图: learning-paths/curriculum-map.md
  - 开始学习:
      - 工程基础入门:
          - 学习方法: learning-paths/engineering-foundation/stage-0/01-learning-method.md
          - 文件系统: learning-paths/engineering-foundation/stage-0/02-filesystem.md
          - 终端与 Shell: learning-paths/engineering-foundation/stage-0/03-terminal-shell.md
          - 编辑器: learning-paths/engineering-foundation/stage-0/04-editor.md
          - Markdown: learning-paths/engineering-foundation/stage-0/05-markdown.md
          - Git: learning-paths/engineering-foundation/stage-0/06-git.md
          - 开发环境: learning-paths/engineering-foundation/stage-0/07-development-environment.md
          - Docker最小认知: learning-paths/engineering-foundation/stage-0/08-docker-basics.md
          - 验证习惯: learning-paths/engineering-foundation/stage-0/09-validation-habit.md
      - Python 起步:
          - 课程说明: learning-paths/programming-languages/python-basics/README.md
          - 变量、基本类型、输入输出: learning-paths/programming-languages/python-basics/01-variables-types-io.md
          - 条件、循环、布尔逻辑: learning-paths/programming-languages/python-basics/02-conditions-loops-boolean.md
          - 函数、参数、返回值和作用域: learning-paths/programming-languages/python-basics/03-functions-parameters-returns-scope.md
          - 字符串、列表、字典、集合和元组: learning-paths/programming-languages/python-basics/04-strings-collections.md
          - 文件、路径、JSON 和简单目录操作: learning-paths/programming-languages/python-basics/05-files-json-paths.md
          - 模块、导入和虚拟环境: learning-paths/programming-languages/python-basics/06-modules-imports-venv.md
          - 异常、基本调试和最小自动化测试: learning-paths/programming-languages/python-basics/07-errors-debugging-tests.md
      - C++ 核心语言:
          - 课程说明: learning-paths/programming-languages/cpp-core/README.md
          - 从源文件到可执行程序: learning-paths/programming-languages/cpp-core/01-build-types-io.md
      - Python 核心语言:
          - 课程说明: learning-paths/programming-languages/python-core/README.md
          - 类型提示、接口与静态检查认知: learning-paths/programming-languages/python-core/01-type-hints-interfaces-static-checking.md
  - 项目:
      - 项目说明: projects/README.md
      - 项目主干规划: projects/project-roadmap.md
      - Python 内容分析工具: projects/python-content-analysis/README.md
      - 结构化数据机器学习系统: projects/structured-data-ml-system/README.md
      - 文本分类模型演进: projects/text-classification-evolution/README.md
      - 强化学习控制实验: projects/reinforcement-learning-control-lab/README.md
      - 可评估的智能学习助手: projects/intelligent-learning-assistant/README.md
