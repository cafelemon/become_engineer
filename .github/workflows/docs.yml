name: Deploy MkDocs site

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "site-src/**/*.css"
      - "site-src/**/*.js"
      - "site-src/**/*.json"
      - "site-src/**/*.webp"
      - "scripts/test_personalization.cjs"
      - "scripts/test_tutor_search.cjs"
      - "tests/tutor/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Validate tutor knowledge base
        run: node scripts/test_tutor_search.cjs

      - name: Build documentation strictly
        run: mkdocs build --strict

      - name: Validate assessment and route rules
        run: node scripts/test_personalization.cjs

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
