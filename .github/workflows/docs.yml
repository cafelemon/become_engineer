name: Deploy MkDocs site

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "site-src/**/*.css"
      - "site-src/**/*.html"
      - "site-src/**/*.js"
      - "site-src/**/*.ts"
      - "site-src/**/*.json"
      - "site-src/**/*.webp"
      - "site-src/examples/**/*.py"
      - "site-src/examples/**/*.sql"
      - "site-src/examples/**/*.sh"
      - "site-src/examples/**/*.yaml"
      - "site-src/examples/**/Dockerfile"
      - "site-src/examples/**/*.cpp"
      - "site-src/examples/**/*.hpp"
      - "site-src/examples/**/CMakeLists.txt"
      - "site-src/examples/**/requirements*.txt"
      - "exercises/**/*.py"
      - "exercises/**/*.cpp"
      - "exercises/**/*.hpp"
      - "exercises/**/CMakeLists.txt"
      - "exercises/**/pyproject.toml"
      - "scripts/test_personalization.cjs"
      - "scripts/test_engineering_git_local.mjs"
      - "scripts/test_engineering_git_remote.mjs"
      - "scripts/test_engineering_development_environment.mjs"
      - "scripts/test_engineering_docker_basics.mjs"
      - "scripts/test_engineering_validation_habit.mjs"
      - "scripts/test_python_variables_v2.mjs"
      - "scripts/test_python_conditions_v2.mjs"
      - "scripts/test_python_functions_v2.mjs"
      - "scripts/test_python_collections_v2.mjs"
      - "scripts/test_python_files_json_v2.mjs"
      - "scripts/test_python_modules_venv_v2.mjs"
      - "scripts/test_python_errors_tests_v2.mjs"
      - "scripts/test_cs_data_representation_v2.mjs"
      - "scripts/test_cs_operation_growth_v2.mjs"
      - "scripts/test_cs_text_units_v2.mjs"
      - "scripts/test_cs_grid_coordinates_v2.mjs"
      - "scripts/test_python_core_types_v2.mjs"
      - "scripts/test_python_core_interfaces_v2.mjs"
      - "scripts/test_python_core_iterators_v2.mjs"
      - "scripts/test_python_core_dataclasses_v2.mjs"
      - "scripts/test_python_core_decorators_v2.mjs"
      - "scripts/test_python_engineering_package_cli_v2.mjs"
      - "scripts/test_python_engineering_config_diagnostics_v2.mjs"
      - "scripts/test_cpp_start_build_v2.mjs"
      - "scripts/test_cpp_start_functions_v2.mjs"
      - "scripts/test_cpp_core_cmake_v2.mjs"
      - "scripts/test_cpp_core_stl_v2.mjs"
      - "scripts/test_cpp_core_raii_v2.mjs"
      - "scripts/test_cs_dynamic_array_v2.mjs"
      - "scripts/test_cs_singly_linked_v2.mjs"
      - "scripts/test_cs_linked_stack_v2.mjs"
      - "scripts/test_cs_linked_queue_v2.mjs"
      - "scripts/test_cs_hash_collisions_v2.mjs"
      - "scripts/test_cs_hash_table_v2.mjs"
      - "scripts/test_cs_set_frequency_v2.mjs"
      - "scripts/test_cs_ordered_search_v2.mjs"
      - "scripts/test_cs_elementary_sort_v2.mjs"
      - "scripts/test_cs_bottom_up_merge_v2.mjs"
      - "scripts/test_cs_binary_tree_shape_v2.mjs"
      - "scripts/test_cs_recursive_dfs_v2.mjs"
      - "scripts/test_cs_tree_frontier_v2.mjs"
      - "scripts/test_cs_undirected_graph_v2.mjs"
      - "scripts/test_cs_bfs_v2.mjs"
      - "scripts/test_cs_full_graph_dfs_v2.mjs"
      - "scripts/test_cs_min_heap_v2.mjs"
      - "scripts/test_cs_stable_priority_queue_v2.mjs"
      - "scripts/test_cs_dijkstra_v2.mjs"
      - "scripts/test_cs_dsu_v2.mjs"
      - "scripts/test_cs_kruskal_v2.mjs"
      - "scripts/test_cs_lazy_prim_v2.mjs"
      - "scripts/test_web_start_html_v2.mjs"
      - "scripts/test_web_core_typescript_contract_v2.mjs"
      - "scripts/test_web_core_sqlite_persistence_v2.mjs"
      - "scripts/test_web_core_rest_resources_v2.mjs"
      - "scripts/test_web_core_form_state_v2.mjs"
      - "scripts/test_cs_systems_process_v2.mjs"
      - "scripts/test_cs_systems_concurrency_v2.mjs"
      - "scripts/test_cs_systems_resources_v2.mjs"
      - "scripts/test_cs_systems_network_v2.mjs"
      - "scripts/test_cs_systems_transactions_v2.mjs"
      - "scripts/test_cs_systems_authorization_v2.mjs"
      - "scripts/test_direction_choice_portfolio_v2.mjs"
      - "scripts/generate_direction_choice_tutor.mjs"
      - "scripts/test_web_engineering_postgres_v2.mjs"
      - "scripts/test_web_engineering_sessions_v2.mjs"
      - "scripts/test_web_engineering_authorization_v2.mjs"
      - "scripts/test_web_engineering_e2e_v2.mjs"
      - "scripts/test_web_engineering_container_v2.mjs"
      - "scripts/test_web_engineering_release_v2.mjs"
      - "scripts/lib/validate_web_engineering_lesson.mjs"
      - "scripts/generate_web_engineering_tutor.mjs"
      - "scripts/test_tutor_search.cjs"
      - "tests/tutor/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "requirements-ci.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dashboard
          POSTGRES_USER: dashboard
          POSTGRES_PASSWORD: dashboard
        ports:
          - 55439:5432
        options: >-
          --health-cmd "pg_isready -U dashboard -d dashboard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            site-src/examples/web-core/learning-dashboard-v05/package-lock.json
            site-src/examples/web-core/learning-dashboard-v06/package-lock.json
            site-src/examples/web-core/learning-dashboard-v07/package-lock.json
            site-src/examples/web-core/learning-dashboard-v08/package-lock.json
            site-src/examples/web-engineering/learning-dashboard-v12/package-lock.json

      - name: Install CI dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements-ci.txt
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Validate tutor knowledge base
        run: node scripts/test_tutor_search.cjs

      - name: Verify local Git lesson example
        run: node scripts/test_engineering_git_local.mjs

      - name: Verify Git remote lesson example
        run: node scripts/test_engineering_git_remote.mjs

      - name: Verify development environment lesson example
        run: node scripts/test_engineering_development_environment.mjs

      - name: Verify Docker basics lesson example
        run: node scripts/test_engineering_docker_basics.mjs

      - name: Verify engineering foundation acceptance example
        run: node scripts/test_engineering_validation_habit.mjs

      - name: Verify Python variables lesson examples
        run: node scripts/test_python_variables_v2.mjs

      - name: Verify Python conditions lesson examples
        run: node scripts/test_python_conditions_v2.mjs

      - name: Verify Python functions lesson examples
        run: node scripts/test_python_functions_v2.mjs

      - name: Verify Python collections lesson examples
        run: node scripts/test_python_collections_v2.mjs

      - name: Verify Python files and JSON lesson examples
        run: node scripts/test_python_files_json_v2.mjs

      - name: Verify Python modules and virtual environment lesson examples
        run: node scripts/test_python_modules_venv_v2.mjs

      - name: Verify Python errors, debugging, and tests lesson examples
        run: node scripts/test_python_errors_tests_v2.mjs

      - name: Verify CS data representation lesson example
        run: node scripts/test_cs_data_representation_v2.mjs

      - name: Verify CS operation growth lesson example
        run: node scripts/test_cs_operation_growth_v2.mjs

      - name: Verify CS text units lesson example
        run: node scripts/test_cs_text_units_v2.mjs

      - name: Verify CS grid coordinates lesson example
        run: node scripts/test_cs_grid_coordinates_v2.mjs

      - name: Verify Python core type contracts lesson example
        run: node scripts/test_python_core_types_v2.mjs

      - name: Verify Python core interfaces lesson example
        run: node scripts/test_python_core_interfaces_v2.mjs

      - name: Verify Python core iterators lesson example
        run: node scripts/test_python_core_iterators_v2.mjs

      - name: Verify Python core dataclasses lesson example
        run: node scripts/test_python_core_dataclasses_v2.mjs

      - name: Verify Python core decorators lesson example
        run: node scripts/test_python_core_decorators_v2.mjs

      - name: Verify Python packaging and CLI lesson
        run: node scripts/test_python_engineering_package_cli_v2.mjs

      - name: Verify Python configuration and diagnostics lesson
        run: node scripts/test_python_engineering_config_diagnostics_v2.mjs

      - name: Verify C++ build and types lesson
        run: node scripts/test_cpp_start_build_v2.mjs

      - name: Verify C++ functions and program organization lesson
        run: node scripts/test_cpp_start_functions_v2.mjs

      - name: Verify C++ headers, sources, and CMake lesson
        run: node scripts/test_cpp_core_cmake_v2.mjs

      - name: Verify C++ STL containers and algorithms lesson
        run: node scripts/test_cpp_core_stl_v2.mjs

      - name: Verify C++ object lifetime and RAII lesson
        run: node scripts/test_cpp_core_raii_v2.mjs

      - name: Verify dynamic array capacity and amortized cost lesson
        run: node scripts/test_cs_dynamic_array_v2.mjs

      - name: Verify singly linked list and ownership lesson
        run: node scripts/test_cs_singly_linked_v2.mjs

      - name: Verify linked stack and LIFO lesson
        run: node scripts/test_cs_linked_stack_v2.mjs

      - name: Verify linked queue and FIFO lesson
        run: node scripts/test_cs_linked_queue_v2.mjs

      - name: Verify hash function and collision lesson
        run: node scripts/test_cs_hash_collisions_v2.mjs

      - name: Verify separate chaining and rehash lesson
        run: node scripts/test_cs_hash_table_v2.mjs

      - name: Verify set, frequency, and stable output lesson
        run: node scripts/test_cs_set_frequency_v2.mjs

      - name: Verify ordered search and bound lesson
        run: node scripts/test_cs_ordered_search_v2.mjs

      - name: Verify elementary sorting and stability lesson
        run: node scripts/test_cs_elementary_sort_v2.mjs

      - name: Verify bottom-up merge sort lesson
        run: node scripts/test_cs_bottom_up_merge_v2.mjs

      - name: Verify binary tree shape lesson
        run: node scripts/test_cs_binary_tree_shape_v2.mjs

      - name: Verify recursive DFS lesson
        run: node scripts/test_cs_recursive_dfs_v2.mjs

      - name: Verify tree frontier lesson
        run: node scripts/test_cs_tree_frontier_v2.mjs

      - name: Verify undirected graph lesson
        run: node scripts/test_cs_undirected_graph_v2.mjs

      - name: Verify BFS shortest-path lesson
        run: node scripts/test_cs_bfs_v2.mjs

      - name: Verify full-graph DFS lesson
        run: node scripts/test_cs_full_graph_dfs_v2.mjs

      - name: Verify binary min-heap lesson
        run: node scripts/test_cs_min_heap_v2.mjs

      - name: Verify stable priority queue lesson
        run: node scripts/test_cs_stable_priority_queue_v2.mjs

      - name: Verify Dijkstra lesson
        run: node scripts/test_cs_dijkstra_v2.mjs

      - name: Verify disjoint-set lesson
        run: node scripts/test_cs_dsu_v2.mjs

      - name: Verify Kruskal lesson
        run: node scripts/test_cs_kruskal_v2.mjs

      - name: Verify Lazy Prim lesson
        run: node scripts/test_cs_lazy_prim_v2.mjs

      - name: Verify Web start HTML lesson
        if: ${{ hashFiles('scripts/test_web_start_html_v2.mjs') != '' }}
        run: node scripts/test_web_start_html_v2.mjs

      - name: Install Web core TypeScript dependencies
        if: ${{ hashFiles('site-src/examples/web-core/learning-dashboard-v05/package-lock.json') != '' }}
        run: npm ci --prefix site-src/examples/web-core/learning-dashboard-v05

      - name: Verify Web core TypeScript contract lesson
        if: ${{ hashFiles('scripts/test_web_core_typescript_contract_v2.mjs') != '' }}
        run: node scripts/test_web_core_typescript_contract_v2.mjs

      - name: Install Web core SQLite dependencies
        if: ${{ hashFiles('site-src/examples/web-core/learning-dashboard-v06/package-lock.json') != '' }}
        run: npm ci --prefix site-src/examples/web-core/learning-dashboard-v06

      - name: Verify Web core SQLite persistence lesson
        if: ${{ hashFiles('scripts/test_web_core_sqlite_persistence_v2.mjs') != '' }}
        run: node scripts/test_web_core_sqlite_persistence_v2.mjs

      - name: Install Web core REST dependencies
        if: ${{ hashFiles('site-src/examples/web-core/learning-dashboard-v07/package-lock.json') != '' }}
        run: npm ci --prefix site-src/examples/web-core/learning-dashboard-v07

      - name: Verify Web core REST resources lesson
        if: ${{ hashFiles('scripts/test_web_core_rest_resources_v2.mjs') != '' }}
        run: node scripts/test_web_core_rest_resources_v2.mjs

      - name: Install Web core form dependencies
        if: ${{ hashFiles('site-src/examples/web-core/learning-dashboard-v08/package-lock.json') != '' }}
        run: npm ci --prefix site-src/examples/web-core/learning-dashboard-v08

      - name: Verify Web core form state lesson
        if: ${{ hashFiles('scripts/test_web_core_form_state_v2.mjs') != '' }}
        run: node scripts/test_web_core_form_state_v2.mjs

      - name: Verify CS systems process lesson
        run: node scripts/test_cs_systems_process_v2.mjs

      - name: Verify first project and direction trials
        run: node scripts/test_direction_choice_portfolio_v2.mjs

      - name: Verify algorithm rehearsal judge contract
        run: node scripts/test_career_algorithm_01_v2.mjs

      - name: Verify timed algorithm rehearsal
        run: node scripts/test_career_algorithm_02_v2.mjs

      - name: Verify algorithm retrospective and regressions
        run: node scripts/test_career_algorithm_03_v2.mjs

      - name: Verify systems engineering file descriptors
        run: node scripts/test_systems_engineering_01_v2.mjs

      - name: Verify systems engineering signal supervision
        run: node scripts/test_systems_engineering_02_v2.mjs

      - name: Verify systems engineering bounded queue
        run: node scripts/test_systems_engineering_03_v2.mjs

      - name: Verify systems engineering nonblocking network
        run: node scripts/test_systems_engineering_04_v2.mjs

      - name: Verify systems engineering performance budget
        run: node scripts/test_systems_engineering_05_v2.mjs

      - name: Verify systems engineering recovery acceptance
        run: node scripts/test_systems_engineering_06_v2.mjs

      - name: Verify algorithm deepening two pointers
        run: node scripts/test_algorithm_deepening_01_v2.mjs

      - name: Verify algorithm deepening sliding window
        run: node scripts/test_algorithm_deepening_02_v2.mjs

      - name: Verify algorithm deepening prefix and difference
        run: node scripts/test_algorithm_deepening_03_v2.mjs

      - name: Verify algorithm deepening monotonic structures
        run: node scripts/test_algorithm_deepening_04_v2.mjs

      - name: Verify algorithm deepening backtracking
        run: node scripts/test_algorithm_deepening_05_v2.mjs

      - name: Verify algorithm deepening greedy exchange
        run: node scripts/test_algorithm_deepening_06_v2.mjs

      - name: Verify algorithm deepening linear dynamic programming
        run: node scripts/test_algorithm_deepening_07_v2.mjs

      - name: Verify algorithm deepening structured dynamic programming
        run: node scripts/test_algorithm_deepening_08_v2.mjs

      - name: Verify algorithm deepening advanced graph
        run: node scripts/test_algorithm_deepening_09_v2.mjs

      - name: Verify algorithm deepening string matching
        run: node scripts/test_algorithm_deepening_10_v2.mjs

      - name: Verify AI math and data vector contracts
        run: node scripts/test_ai_math_data_01_v2.mjs

      - name: Verify AI math and data scaling contracts
        run: node scripts/test_ai_math_data_02_v2.mjs

      - name: Verify CS systems concurrency lesson
        run: node scripts/test_cs_systems_concurrency_v2.mjs

      - name: Verify CS systems resource lifecycle lesson
        run: node scripts/test_cs_systems_resources_v2.mjs

      - name: Verify CS systems local network lesson
        run: node scripts/test_cs_systems_network_v2.mjs

      - name: Verify CS systems transactions lesson
        run: node scripts/test_cs_systems_transactions_v2.mjs

      - name: Verify CS systems authorization lesson
        run: node scripts/test_cs_systems_authorization_v2.mjs

      - name: Verify Web engineering PostgreSQL migration lesson
        run: node scripts/test_web_engineering_postgres_v2.mjs

      - name: Verify Web engineering session security lesson
        run: node scripts/test_web_engineering_sessions_v2.mjs

      - name: Verify Web engineering authorization lesson
        run: node scripts/test_web_engineering_authorization_v2.mjs

      - name: Install Web engineering frontend dependencies
        run: npm ci --prefix site-src/examples/web-engineering/learning-dashboard-v12

      - name: Install Playwright Chromium
        run: npx --prefix site-src/examples/web-engineering/learning-dashboard-v12 playwright install --with-deps chromium

      - name: Verify Web engineering frontend and E2E contract lesson
        run: |
          node scripts/test_web_engineering_e2e_v2.mjs
          npm --prefix site-src/examples/web-engineering/learning-dashboard-v12 run test:e2e

      - name: Verify Web engineering container and health lesson
        run: node scripts/test_web_engineering_container_v2.mjs

      - name: Smoke-test Web engineering Compose runtime
        run: |
          set -eu
          compose_file=site-src/examples/web-engineering/learning-dashboard-v13/compose.yaml
          cleanup_compose() { docker compose -f "$compose_file" stop; }
          trap cleanup_compose EXIT
          docker compose -f "$compose_file" up -d --build
          app_ready=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:58080/health/ready; then
              app_ready=true
              break
            fi
            sleep 1
          done
          test "$app_ready" = true
          curl -fsS http://127.0.0.1:58080/health/live
          docker compose -f "$compose_file" exec -T app id | grep 'uid=10001(appuser)'

      - name: Verify Web engineering observability and release lesson
        run: node scripts/test_web_engineering_release_v2.mjs

      - name: Restore PostgreSQL backup into an independent database
        run: |
          docker run --rm --network host \
            -e PGPASSWORD=dashboard \
            -e DATABASE_URL=postgresql://dashboard:dashboard@127.0.0.1:55439/dashboard \
            -e VERIFY_DATABASE_URL=postgresql://dashboard:dashboard@127.0.0.1:55439/dashboard_verify \
            -v "$PWD/site-src/examples/web-engineering/learning-dashboard-v14/backup_restore.sh:/work/backup_restore.sh:ro" \
            postgres:16-alpine sh -c 'dropdb -h 127.0.0.1 -p 55439 -U dashboard --if-exists dashboard_verify && createdb -h 127.0.0.1 -p 55439 -U dashboard dashboard_verify && sh /work/backup_restore.sh /tmp/dashboard.dump'

      - name: Build documentation strictly
        run: mkdocs build --strict

      - name: Validate assessment and route rules
        run: node scripts/test_personalization.cjs

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
