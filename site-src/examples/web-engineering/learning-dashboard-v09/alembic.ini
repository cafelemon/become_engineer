[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://dashboard:dashboard@127.0.0.1:55439/dashboard

[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys =
[formatters]
keys = generic
[logger_root]
level = WARN
handlers =
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
